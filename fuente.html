<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fuente Refrigerada - CETAQUA 20</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c1a32;
            color: #e2e8f0;
            background-image:
                radial-gradient(circle at 20% 30%, rgba(14,165,233,0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(251,191,36,0.10) 0%, transparent 50%),
                linear-gradient(135deg, #0c1a32 0%, #1e293b 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            overflow: hidden;
        }
        body::before {
            content: '';
            position: fixed; top:0;left:0;right:0;bottom:0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L50 0 L25 43.3 Z' fill='white' fill-opacity='0.01'/%3E%3Cpath d='M100 100 L50 100 L75 56.7 Z' fill='%23fbbf24' fill-opacity='0.015'/%3E%3C/svg%3E");
            background-size: 400px 400px;
            pointer-events: none; z-index:-1;
        }
        .btn-fuente {
            width: 280px; height: 280px;
            border-radius: 50%;
            background: radial-gradient(circle at 35% 35%, #ff4d4d, #cc0000, #7f0000);
            border: 6px solid rgba(255,255,255,0.15);
            box-shadow:
                0 0 0 12px rgba(200,0,0,0.15),
                0 0 0 24px rgba(200,0,0,0.08),
                0 20px 60px rgba(200,0,0,0.5),
                inset 0 -8px 20px rgba(0,0,0,0.4),
                inset 0 8px 20px rgba(255,150,150,0.2);
            cursor: pointer;
            transition: all 0.1s ease;
            position: relative;
            display: flex; align-items: center; justify-content: center;
            flex-direction: column; gap: 8px;
            user-select: none;
            -webkit-tap-highlight-color: transparent;
        }
        .btn-fuente:hover {
            box-shadow:
                0 0 0 14px rgba(200,0,0,0.22),
                0 0 0 30px rgba(200,0,0,0.10),
                0 25px 70px rgba(200,0,0,0.6),
                inset 0 -8px 20px rgba(0,0,0,0.4),
                inset 0 8px 20px rgba(255,150,150,0.2);
            transform: scale(1.03);
        }
        .btn-fuente:active, .btn-fuente.pressed {
            transform: scale(0.93);
            box-shadow:
                0 0 0 8px rgba(200,0,0,0.3),
                0 10px 30px rgba(200,0,0,0.5),
                inset 0 8px 20px rgba(0,0,0,0.5);
        }
        .btn-fuente::before {
            content: '';
            position: absolute; top: 18%; left: 22%;
            width: 35%; height: 28%;
            background: radial-gradient(ellipse, rgba(255,255,255,0.35) 0%, transparent 70%);
            border-radius: 50%;
            pointer-events: none;
        }
        @keyframes ripple {
            0%   { transform: scale(1); opacity: 0.7; }
            100% { transform: scale(2.4); opacity: 0; }
        }
        .ripple-ring {
            position: absolute; inset: -6px;
            border-radius: 50%;
            border: 3px solid rgba(255,80,80,0.7);
            animation: ripple 0.75s ease-out forwards;
            pointer-events: none;
        }
        @keyframes countPop {
            0%   { transform: scale(1); }
            40%  { transform: scale(1.3); }
            100% { transform: scale(1); }
        }
        .count-pop { animation: countPop 0.35s ease-out; }
        @keyframes toastIn {
            0%   { opacity:0; transform: translateX(-50%) translateY(16px) scale(0.9); }
            15%  { opacity:1; transform: translateX(-50%) translateY(0)    scale(1);   }
            75%  { opacity:1; }
            100% { opacity:0; }
        }
        .toast {
            animation: toastIn 2.2s ease forwards;
            position: fixed; bottom: 50px; left: 50%;
            transform: translateX(-50%);
            background: rgba(16,185,129,0.15);
            border: 1px solid rgba(16,185,129,0.4);
            color: #34d399;
            font-size: 13px; font-weight: 800;
            padding: 10px 24px; border-radius: 999px;
            pointer-events: none; white-space: nowrap;
            backdrop-filter: blur(10px); z-index: 100;
        }
        .toast.error {
            background: rgba(239,68,68,0.15);
            border-color: rgba(239,68,68,0.4);
            color: #f87171;
        }
        .glass-card {
            background: rgba(30,41,59,0.5);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 20px;
        }
        .btn-disabled { opacity: 0.5; pointer-events: none; }
    </style>
</head>

        <!-- Title -->
        <div class="space-y-1">
            <h1 class="text-2xl font-black uppercase tracking-widest text-sky-400">Fuente Refrigerada</h1>
            <p class="text-slate-400 text-sm font-medium">Pulsa cada vez que alguien use la fuente</p>
        </div>

        <!-- Stats -->
        <div class="flex gap-4 flex-wrap justify-center">
            <div class="glass-card px-6 py-4 text-center min-w-[100px]">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">Usos</p>
                <p id="count-display" class="text-4xl font-black text-white">—</p>
            </div>
            <div class="glass-card px-6 py-4 text-center min-w-[130px]">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">Acumulado</p>
                <p id="acum-display" class="text-4xl font-black text-sky-400">— m³</p>
            </div>
            <div class="glass-card px-6 py-4 text-center min-w-[100px]">
                <p class="text-slate-500 text-[10px] font-bold uppercase tracking-widest mb-1">Por uso</p>
                <p class="text-4xl font-black text-emerald-400">250 L</p>
            </div>
        </div>

        <!-- BIG RED BUTTON -->
        <div class="relative flex items-center justify-center" style="width:300px;height:300px;">
            <button id="big-btn" class="btn-fuente" onclick="handlePress()">
                <span style="font-size:54px;line-height:1;filter:drop-shadow(0 2px 4px rgba(0,0,0,0.5))">💧</span>
                <span style="font-size:12px;font-weight:900;letter-spacing:0.15em;text-transform:uppercase;color:rgba(255,255,255,0.85);text-shadow:0 1px 3px rgba(0,0,0,0.5)">Uso de fuente</span>
            </button>
        </div>

        <!-- Last press -->
        <p id="last-press" class="text-slate-600 text-xs font-medium" style="min-height:16px;margin-top:-16px"></p>

    </main>

    <script>
        const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbywndRxwgUQxL3GTBV8b5ABR0ETNKAWY498NVk1INzsG6gYuDAZBapi64IcOOnb-0QTFA/exec';
        const TOKEN = '20cetaqua';

        let usesThisSession = 0;
        let isLoading = false;

        async function handlePress() {
            if (isLoading) return;
            isLoading = true;

            const btn = document.getElementById('big-btn');
            btn.classList.add('pressed');
            addRipple(btn);
            setTimeout(() => btn.classList.remove('pressed'), 200);

            try {
                const res = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    body: JSON.stringify({ action: 'fuente', token: TOKEN })
                });
                const result = await res.json();

                if (result.ok) {
                    updateDisplay(result);
                    if (result.is_baseline) {
                        showToast('✅ Registro inicial creado — baseline establecido');
                    } else {
                        usesThisSession++;
                        showToast('+250 L registrados · ' + result.acumulado_m3 + ' m³ acumulados');
                    }
                    document.getElementById('last-press').textContent =
                        'Último registro: ' + new Date().toLocaleTimeString('es-ES');
                } else {
                    showToast('⚠ ' + (result.error || 'Error desconocido'), true);
                }
            } catch(err) {
                showToast('📡 Error de conexión — inténtalo de nuevo', true);
                console.error(err);
            } finally {
                isLoading = false;
            }
        }

        function updateDisplay(result) {
            const countEl = document.getElementById('count-display');
            const acumEl  = document.getElementById('acum-display');

            // Count = number of non-baseline rows = acumulado_litros / 250
            const uses = result.is_baseline ? 0 : Math.round(result.acumulado_litros / 250);
            countEl.textContent = uses;
            pop(countEl);

            acumEl.textContent = result.acumulado_m3 + ' m³';
            pop(acumEl);
        }

        function pop(el) {
            el.classList.remove('count-pop');
            void el.offsetWidth; // reflow
            el.classList.add('count-pop');
        }

        function addRipple(btn) {
            const ring = document.createElement('div');
            ring.className = 'ripple-ring';
            btn.appendChild(ring);
            setTimeout(() => ring.remove(), 800);
        }

        function showToast(msg, isError) {
            document.querySelectorAll('.toast').forEach(t => t.remove());
            const toast = document.createElement('div');
            toast.className = 'toast' + (isError ? ' error' : '');
            toast.textContent = msg;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2300);
        }
    </script>
