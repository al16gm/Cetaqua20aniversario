<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CETAQUA 20 Aniversario | Huella Hídrica</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@700;900&family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/motion@10.16.2/dist/motion.js"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #0c1a32;
            color: #fff;
            overflow: hidden;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .bg-glow {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background: 
                radial-gradient(circle at 20% 30%, rgba(14, 165, 233, 0.15) 0%, transparent 50%),
                radial-gradient(circle at 80% 70%, rgba(251, 191, 36, 0.1) 0%, transparent 50%),
                linear-gradient(135deg, #0c1a32 0%, #1e293b 100%);
            z-index: -2;
        }

        .geometric-pattern {
            position: fixed;
            top: 0; left: 0; right: 0; bottom: 0;
            background-image: url("data:image/svg+xml,%3Csvg width='100' height='100' viewBox='0 0 100 100' xmlns='http://www.w3.org/2000/svg'%3E%3Cpath d='M0 0 L50 0 L25 43.3 Z' fill='white' fill-opacity='0.01'/%3E%3Cpath d='M100 100 L50 100 L75 56.7 Z' fill='%23fbbf24' fill-opacity='0.015'/%3E%3Cpath d='M0 100 L0 50 L43.3 75 Z' fill='white' fill-opacity='0.01'/%3E%3Cpath d='M100 0 L100 50 L56.7 25 Z' fill='%23fbbf24' fill-opacity='0.015'/%3E%3C/svg%3E");
            background-size: 400px 400px;
            opacity: 0.5;
            z-index: -1;
        }

        .btn-gold {
            background: linear-gradient(135deg, #fbbf24 0%, #d97706 100%);
            box-shadow: 0 10px 30px rgba(251, 191, 36, 0.3);
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        .btn-gold:hover {
            transform: translateY(-5px) scale(1.02);
            box-shadow: 0 20px 40px rgba(251, 191, 36, 0.4);
        }
        .btn-gold:active {
            transform: translateY(0) scale(0.98);
        }

        .water-drop {
            filter: drop-shadow(0 0 20px rgba(14, 165, 233, 0.4));
            animation: float 6s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }

        .title-gradient {
            background: linear-gradient(to bottom, #fff 30%, #94a3b8 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
    </style>
</head>
<body>
    <div class="bg-glow"></div>
    <div class="geometric-pattern"></div>

    <!-- Acceso Directo Panel (Top Right) -->
    <div class="fixed top-6 right-6 z-50">
        <a href="panel.html" class="flex items-center gap-2 bg-white/5 hover:bg-white/10 border border-white/10 px-4 py-2 rounded-full text-[10px] font-bold uppercase tracking-widest transition-all">
            Dashboard
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z" />
            </svg>
        </a>
    </div>

    <main class="max-w-xl w-full px-6 text-center">
        <div id="hero-content" class="space-y-4">
            <!-- Icono / Logo -->
            <div class="relative inline-block">
                <div class="water-drop text-8xl">💧</div>
                <div class="absolute -top-4 -right-4 bg-amber-400 text-slate-900 font-black px-3 py-1 rounded-full text-xs tracking-tighter">20 AÑOS</div>
            </div>

            <!-- Títulos -->
            <div class="space-y-2">
                <h2 class="text-sky-400 font-black uppercase tracking-[0.4em] text-sm">Aniversario Cetaqua</h2>
                <h1 class="text-5xl md:text-6xl font-black title-gradient leading-tight tracking-tighter uppercase">
                    Compensa tu<br>Huella Hídrica
                </h1>
                <p class="text-slate-400 text-lg font-medium max-w-sm mx-auto leading-relaxed">
                    Únete a nuestra misión colectiva y descubre cómo tus acciones diarias pueden proteger el futuro del agua.
                </p>
            </div>

            <!-- Botón de Acción -->
            <div class="pt-2 flex justify-center">
                <a href="form.html" class="btn-gold w-full sm:w-auto inline-flex items-center justify-center gap-4 px-10 py-6 rounded-full text-slate-900 font-black uppercase tracking-widest text-lg group">
                    Comenzar Misión
                    <svg xmlns="http://www.w3.org/2000/svg" class="h-6 w-6 transition-transform group-hover:translate-x-2" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="3" d="M13 7l5 5m0 0l-5 5m5-5H6" />
                    </svg>
                </a>
            </div>

            <!-- Footer Portada -->
            <div class="pt-12 flex flex-col items-center gap-6">
                <div class="flex items-center justify-center gap-8 opacity-40">
                    <div class="h-px w-12 bg-white"></div>
                    <span class="text-[10px] font-bold uppercase tracking-[0.5em]">Barcelona 2026</span>
                    <div class="h-px w-12 bg-white"></div>
                </div>
                <a href="panel.html" class="text-[10px] font-bold uppercase tracking-widest text-slate-500 hover:text-sky-400 transition-colors">
                    Acceso Panel de Impacto
                </a>
            </div>
        </div>
    </main>

    <script>
        window.addEventListener('DOMContentLoaded', () => {
            if (typeof window.Motion !== 'undefined') {
                const { animate, stagger } = window.Motion;
                animate("#hero-content > *", 
                    { opacity: [0, 1], y: [40, 0] }, 
                    { delay: stagger(0.2), duration: 0.8, easing: "ease-out" }
                );
            }
        });
    </script>
</body>
</html>
